# ---------------------------------------------------------------------------
# Netlify deployment configuration
# ---------------------------------------------------------------------------
# Build command and publish directory for Vite production builds.
# Redirects handle client-side routing for single-page apps.
# ---------------------------------------------------------------------------

[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback - all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "frame-ancestors 'self' https://autera.us http://localhost:3000"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
